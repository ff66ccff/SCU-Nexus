name: 功能建议
description: 提议一个聚焦且可验证的改进
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题
      description: 请描述用户现在遇到的具体问题，而不只是解决方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 本 Issue 不包含账号、Cookie、成绩或其他敏感数据。
          required: true
